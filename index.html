<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Nossa Fazendinha 🌻</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Nunito:wght@600;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ink: #4a3326;
      --cream: #fff6e6;
      --cream-line: #e7c9a0;
      --heart: #e8607a;
      --heart-d: #c84a64;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #2b5d34;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--ink);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #stage {
      position: fixed;
      inset: 0;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px;
      pointer-events: none;
      z-index: 5;
    }

    #hearts {
      background: rgba(255, 246, 230, .92);
      border: 3px solid var(--cream-line);
      border-radius: 14px;
      padding: 7px 12px;
      font-family: 'Silkscreen';
      font-size: 13px;
      color: var(--heart-d);
      box-shadow: 0 4px 0 rgba(0, 0, 0, .12);
    }

    #mute {
      pointer-events: auto;
      cursor: pointer;
      background: rgba(255, 246, 230, .92);
      border: 3px solid var(--cream-line);
      border-radius: 14px;
      width: 42px;
      height: 42px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .12);
    }

    #controls {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
    }

    #dpad {
      position: absolute;
      left: 18px;
      bottom: 24px;
      width: 150px;
      height: 150px;
      pointer-events: auto;
    }

    .dbtn {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(255, 246, 230, .9);
      border: 3px solid var(--cream-line);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--ink);
      box-shadow: 0 4px 0 rgba(0, 0, 0, .15);
    }

    .dbtn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, .15);
    }

    #up {
      top: 0;
      left: 50px;
    }

    #down {
      bottom: 0;
      left: 50px;
    }

    #left {
      left: 0;
      top: 50px;
    }

    #right {
      right: 0;
      top: 50px;
    }

    #btnA {
      position: absolute;
      right: 24px;
      bottom: 34px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--heart);
      border: 4px solid #fff;
      color: #fff;
      font-family: 'Silkscreen';
      font-size: 13px;
      pointer-events: auto;
      box-shadow: 0 5px 0 var(--heart-d);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.1;
    }

    #btnA:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--heart-d);
    }

    #dialogue {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: min(560px, 92vw);
      background: var(--cream);
      border: 4px solid var(--cream-line);
      border-radius: 18px;
      padding: 18px 20px 20px;
      z-index: 8;
      display: none;
      box-shadow: 0 8px 0 rgba(0, 0, 0, .15), 0 14px 30px rgba(0, 0, 0, .25);
    }

    #dialogue .who {
      font-family: 'Silkscreen';
      font-size: 12px;
      color: var(--heart-d);
      margin-bottom: 8px;
      letter-spacing: .5px;
    }

    #dialogue .txt {
      font-size: 18px;
      line-height: 1.45;
      font-weight: 600;
      min-height: 54px;
    }

    #dialogue .next {
      text-align: right;
      font-family: 'Silkscreen';
      font-size: 11px;
      color: #b08a5a;
      margin-top: 10px;
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink {
      50% {
        opacity: .25;
      }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    #start {
      background: linear-gradient(180deg, #ffd9a8 0%, #fcb0c0 55%, #caa6e0 100%);
    }

    #start h1 {
      font-family: 'Silkscreen';
      font-size: clamp(26px, 7vw, 46px);
      color: #fff;
      margin: 0 0 6px;
      text-shadow: 0 3px 0 var(--heart-d), 0 6px 14px rgba(0, 0, 0, .25);
      line-height: 1.15;
    }

    #start p {
      font-weight: 700;
      color: #7a4a55;
      margin: 6px 0 26px;
      font-size: clamp(15px, 4vw, 18px);
    }

    .bigbtn {
      font-family: 'Silkscreen';
      font-size: 18px;
      background: var(--heart);
      color: #fff;
      border: 4px solid #fff;
      border-radius: 16px;
      padding: 16px 30px;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--heart-d);
    }

    .bigbtn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 var(--heart-d);
    }

    #proposal {
      display: none;
      pointer-events: none;
      z-index: 11;
    }

    #proposal .card {
      pointer-events: auto;
      background: var(--cream);
      border: 4px solid var(--cream-line);
      border-radius: 20px;
      padding: 26px 24px;
      max-width: min(520px, 92vw);
      position: relative;
      box-shadow: 0 10px 0 rgba(0, 0, 0, .15), 0 20px 40px rgba(0, 0, 0, .3);
    }

    #proposal h2 {
      font-family: 'Silkscreen';
      font-size: clamp(18px, 5vw, 26px);
      color: var(--heart-d);
      margin: 0 0 14px;
      line-height: 1.3;
    }

    #proposal .btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 70px;
    }

    #yes {
      font-family: 'Silkscreen';
      background: var(--heart);
      color: #fff;
      border: 4px solid #fff;
      border-radius: 14px;
      padding: 16px 26px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 5px 0 var(--heart-d);
    }

    #yes:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--heart-d);
    }

    #no {
      font-family: 'Silkscreen';
      background: #6fb0a6;
      color: #fff;
      border: 3px solid #fff;
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 0 #4f8b82;
      transition: transform .12s, left .12s, top .12s;
    }

    #no:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #4f8b82;
    }

    .hide {
      display: none !important;
    }

    @media (min-width:820px) {

      #dpad,
      #btnA {
        opacity: .55;
      }
    }
  </style>
</head>

<body>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hud">
      <div id="hearts">&#9829; 0/5</div>
      <div id="mute">&#128266;</div>
    </div>
    <div id="controls" class="hide">
      <div id="dpad">
        <div class="dbtn" id="up">&#9650;</div>
        <div class="dbtn" id="down">&#9660;</div>
        <div class="dbtn" id="left">&#9664;</div>
        <div class="dbtn" id="right">&#9654;</div>
      </div>
      <div id="btnA">A&#9829;</div>
    </div>
    <div id="dialogue">
      <div class="who" id="dWho"></div>
      <div class="txt" id="dTxt"></div>
      <div class="next">toque para continuar &#9654;</div>
    </div>
    <div id="proposal" class="overlay">
      <div class="card">
        <h2 id="pTitle"></h2>
        <div class="btns"><button id="yes">SIM &#9829;</button><button id="no">não</button></div>
      </div>
    </div>
    <div id="start" class="overlay">
      <h1 id="sTitle">Nossa Fazendinha</h1>
      <p id="sSub">um cantinho que eu plantei só pra você</p>
      <button class="bigbtn" id="startBtn">COME&#199;AR &#9829;</button>
    </div>
  </div>

  <script>
    //============================================================
    //  EDITE AQUI
    //============================================================
    const TRACKER_URL = 'https://script.google.com/macros/s/AKfycbyFSEK5zmrxGVQHo_FUViXc0pg51pdEnDDWLOo0Fvk3lsic1NC6YAnjDBfTaj7Xnckt/exec';

    function registrar(resposta) {
      if (!TRACKER_URL) return;
      fetch(TRACKER_URL + '?resposta=' + resposta).catch(() => {});
    }

    const NAME_HER = "Xay", NAME_HIM = "Dell";
    const HEART_MSGS = [
      "Oi, Xay! 🌻 Bem-vinda à fazendinha que eu preparei especialmente para você. Por aqui existem 5 corações mágicos espalhados esperando para serem encontrados ❤️. Quando encontrar um coração brilhando, chegue perto dele e aperte o botão A para coletá-lo. O botão A também serve para interagir com objetos, conversar e descobrir algumas surpresas escondidas pelo caminho...",
      "Coração 1: Xay, sabe o que eu mais gosto em você? A facilidade que você tem de transformar uma conversa comum em uma das melhores partes do meu dia.",
      "Coração 2: eu amo te ouvir falar. Com o tempo, você virou aquela pessoa com quem eu posso falar sobre qualquer coisa, sem precisar medir palavras ou fingir que está tudo bem.",
      "Coração 3: com você, até as coisas mais bobas e simples viram as minhas favoritas do mundo. O mais engraçado é que você entrou na minha vida sem fazer barulho e, aos poucos, acabou se tornando alguém que eu espero encontrar todos os dias.",
      "Coração 4: Às vezes eu penso que a vida gosta de criar caminhos estranhos. Mesmo assim, fico feliz por ela ter cruzado os nossos e me permitido conhecer alguém tão especial.",
      "Coração 5: Talvez exista um universo onde a gente tenha uma fazenda de verdade, cuide dos animais juntos e termine cada dia vendo o pôr do sol na varanda. Enquanto esse lugar não existe, eu construí este pequeno cantinho para nós. Agora vire para trás. 💛"
    ];
    const ENDING_LINES = [
      "Oi, Xay... fui eu que plantei essa fazendinha inteira, só pra te trazer até aqui.",
      "Cada cantinho desse lugar é um pedaço do quanto eu gosto de você.",
      "Vem comigo um instante... quero te mostrar uma coisa.",
    ];
    const SUNSET_LINES = [
      "Pronto. Esse pôr do sol é lindo, mas ainda não consegue competir com a forma como você ilumina os meus dias.",
      "Eu sei que a vida real é complicada e que nem sempre podemos viver tudo o que gostaríamos.",
      "Mas pensei que, pelo menos aqui, neste cantinho que eu criei para nós, a gente pudesse sonhar sem limites.",
      "Então eu preciso muito te perguntar uma coisa...",
    ];
    const PROPOSAL_Q = "Xayane, você quer namorar comigo? 💛";
    const CREDITS = ["Nossa Fazendinha", "", "um presente do " + NAME_HIM, "para a " + NAME_HER, "", "feito com muito amor", "", "💛", "", "obrigado por dizer sim"];
    const GO_CREDITS = ["você escolheu... 'não' 💔", "", "tudo bem, eu insisto 😌", "", "recomeçando o joguinho...", "", "(da próxima, clica no SIM 😉)"];

    //  APARÊNCIA (ajustada pela foto da Xay)
    const XAY = {
      skin: '#d49a63', hair: '#15110e', longHair: true, curly: true, top: '#f2efe6',
      bottom: '#5b7fae', skirt: true, boots: '#7a4a28', blush: true, glasses: false, accent: '#ff7aa2'
    };
    const JAR = {
      skin: '#e0a878', hair: '#241a14', longHair: false, curly: false, top: '#4f74c4',
      bottom: '#39414f', skirt: false, boots: '#46352a', blush: false, glasses: false, accent: null
    };
    //============================================================

    const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const COLS = 24, ROWS = 16;
    const MAP = [
      "FFFFFFFFFFFFFFFFFFFFFFFF", "F.HHHH......t.....,....F", "F.HHHH...........t.....F",
      "F.HHHH....pppppp.......F", "F...,....p....t....,...F", "F........p..........,..F",
      "F..ccccc.ppppp.........F", "F..ccccc.....p.....t...F", "F........,....p........F",
      "F....t.......pppp......F", "F...........p....,.....F", "F..,.....t..p.....wwww.F",
      "F........pppp.....wwww.F", "F....,......p.....wwww.F", "F..........pp.........,F",
      "FFFFFFFFFFFFFFFFFFFFFFFF"];
    const SOLID = new Set(['F', 'w', 't', 'H']);
    const HEARTS = [{ c: 5, r: 7 }, { c: 19, r: 5 }, { c: 4, r: 12 }, { c: 16, r: 12 }, { c: 12, r: 8 }].map(h => ({ ...h, got: false }));
    const DIROFF = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };

    let TILE = 46, view = { w: 0, h: 0 };
    const player = { x: 11.5, y: 14.3, dir: 'up', moving: false, speed: 3.3 };
    let camX = 0, camY = 0, state = 'START', scene = 'world', last = 0, timeS = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      view.w = window.innerWidth; view.h = window.innerHeight;
      cv.width = Math.floor(view.w * dpr); cv.height = Math.floor(view.h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); ctx.imageSmoothingEnabled = false;
      TILE = Math.max(38, Math.min(64, Math.floor(Math.min(view.w / 11, view.h / 8))));
    }
    addEventListener('resize', resize); resize();

    const keys = {}, padDir = { x: 0, y: 0 };
    addEventListener('keydown', e => {
      keys[e.key] = true;
      if ([' ', 'Enter', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
      if (e.key === ' ' || e.key === 'Enter') actionPress();
    });
    addEventListener('keyup', e => { keys[e.key] = false; });
    function bindPad(id, x, y) {
      const el = document.getElementById(id);
      const on = e => { e.preventDefault(); padDir.x = x; padDir.y = y; };
      const off = e => { e.preventDefault(); if (padDir.x === x && padDir.y === y) { padDir.x = 0; padDir.y = 0; } };
      el.addEventListener('touchstart', on, { passive: false }); el.addEventListener('touchend', off, { passive: false });
      el.addEventListener('touchcancel', off, { passive: false }); el.addEventListener('mousedown', on);
      el.addEventListener('mouseup', off); el.addEventListener('mouseleave', off);
    }
    bindPad('up', 0, -1); bindPad('down', 0, 1); bindPad('left', -1, 0); bindPad('right', 1, 0);
    function bumpCredits() { cut.cspeed = Math.min((cut.cspeed || 70) * 3, 820); }
    function actionPress() {
      if (state === 'DIALOGUE') advanceDialogue(); else if (state === 'PLAY') interact();
      else if (state === 'GAMEOVER') { if (cut.phase === 'gocredits') bumpCredits(); }
      else if (state === 'FINALE' && cut.phase === 'credits') bumpCredits();
    }
    document.getElementById('btnA').addEventListener('click', actionPress);
    document.getElementById('dialogue').addEventListener('click', () => { if (state === 'DIALOGUE') advanceDialogue(); });
    cv.addEventListener('click', () => { if (state === 'FINALE' && cut.phase === 'credits') bumpCredits(); else if (state === 'GAMEOVER' && cut.phase === 'gocredits') bumpCredits(); });

    function inputVector() {
      let x = padDir.x, y = padDir.y;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) x = -1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) x = 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) y = -1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) y = 1;
      return { x, y };
    }
    function tileAt(c, r) { if (c < 0 || r < 0 || c >= COLS || r >= ROWS) return 'F'; return MAP[r][c]; }
    function blocked(x, y) {
      const rad = 0.32, pts = [[x - rad, y - rad], [x + rad, y - rad], [x - rad, y + rad], [x + rad, y + rad], [x, y + 0.36]];
      return pts.some(([px, py]) => SOLID.has(tileAt(Math.floor(px), Math.floor(py))));
    }

    function update(dt) {
      const v = inputVector();
      player.moving = (v.x !== 0 || v.y !== 0);
      if (player.moving) {
        if (v.y < 0) player.dir = 'up'; else if (v.y > 0) player.dir = 'down'; else if (v.x < 0) player.dir = 'left'; else if (v.x > 0) player.dir = 'right';
        const len = Math.hypot(v.x, v.y) || 1, step = player.speed * dt;
        const nx = player.x + (v.x / len) * step, ny = player.y + (v.y / len) * step;
        if (!blocked(nx, player.y)) player.x = nx;
        if (!blocked(player.x, ny)) player.y = ny;
      }
      nearHeart = null;
      for (const h of HEARTS) { if (!h.got) { const d = Math.hypot(player.x - (h.c + 0.5), player.y - (h.r + 0.5)); if (d < 1.0) { nearHeart = h; break; } } }
    }

    // ---- interactions ----
    let toastMsg = null, toastT = 0;
    function toast(s) { toastMsg = s; toastT = 0; }
    function updateToast(dt) { if (toastMsg) { toastT += dt; if (toastT > 2) toastMsg = null; } }
    let parts = [];
    function spawn(c, r, kind) {
      const wx = (c + 0.5) * TILE, wy = (r + 0.5) * TILE;
      const n = kind === 'drop' ? 10 : kind === 'leaf' ? 7 : 9;
      for (let i = 0; i < n; i++) {
        if (kind === 'drop') parts.push({ wx, wy, vx: (Math.random() - .5) * 140, vy: -130 - Math.random() * 90, g: 430, life: .6, col: '#bfe6ff', sz: TILE * 0.1 });
        else if (kind === 'leaf') parts.push({ wx: wx + (Math.random() - .5) * TILE, wy: wy - TILE * 0.3, vx: (Math.random() - .5) * 50, vy: 40 + Math.random() * 40, g: 20, life: 1.4, col: Math.random() < .5 ? '#5bb050' : '#cf9b4a', sz: TILE * 0.12 });
        else parts.push({ wx: wx + (Math.random() - .5) * TILE * 0.6, wy, vx: (Math.random() - .5) * 40, vy: -50 - Math.random() * 60, g: 30, life: .8, col: Math.random() < .5 ? '#ffd24d' : '#fff', sz: TILE * 0.09 });
      }
    }
    function updateParticles(dt) { for (const p of parts) { p.wx += p.vx * dt; p.wy += p.vy * dt; p.vy += p.g * dt; p.life -= dt; } parts = parts.filter(p => p.life > 0); }
    let shakeTile = null;
    function updateShake(dt) { if (shakeTile) { shakeTile.t -= dt; if (shakeTile.t <= 0) shakeTile = null; } }
    function interact() {
      if (nearHeart) { const h = nearHeart; nearHeart = null; collectHeart(h); return; }
      const off = DIROFF[player.dir];
      const fc = Math.floor(player.x + off.x), fr = Math.floor(player.y + off.y);
      const hc = Math.floor(player.x), hr = Math.floor(player.y);
      const tgt = tileAt(fc, fr), here = tileAt(hc, hr);
      if (tgt === 'w') {
        spawn(fc, fr, 'drop'); sfxSplash(); toast([
          "a água tá bem fresquinha... 🫧",
          "dá vontade de ficar só olhando isso por um tempo...",
          "o reflexo daqui é meio hipnotizante...",
          "tem uma calma diferente aqui perto do lago...",
          "eu ficaria horas só olhando essa água... 🫧",
          "o som da água é bem relaxante...",
          "parece que tudo aqui desacelera...",
          "esse lugar dá uma paz estranha... boa estranha",
          "quase parece que o tempo para aqui...",
          "será que tem peixe por aqui? 👀",
          "a água tá gelada mesmo... 🫧",
          "esse lugar combina com silêncio..."
        ][Math.floor(Math.random() * 12)]);
      }
      else if (tgt === 't') {
        shakeTile = { c: fc, r: fr, t: .5 }; spawn(fc, fr, 'leaf'); sfxRustle(); toast([
          "o vento faz as folhas dançarem... 🍃",
          "tem folhas caindo devagar... bem calmo isso",
          "o som das árvores é bem relaxante aqui",
          "parece que a floresta tá respirando",
          "adoro esse barulho do vento nas folhas...",
          "algumas folhas estão caindo sem pressa...",
          "esse lugar parece vivo de um jeito tranquilo",
          "o vento passou por aqui agora há pouco...",
          "dá vontade de ficar só ouvindo isso...",
          "as árvores são altas... meio mágicas até",
          "tem um cheiro de natureza no ar...",
          "essa sombra das árvores é bem gostosa"
        ][Math.floor(Math.random() * 12)]);
      }
      else if (tgt === 'H') {
        sfxKnock(); toast([
          "essa casinha parece bem aconchegante 🏡",
          "dá vontade de chamar isso de lar...",
          "imagina alguém cuidando disso tudo todo dia...",
          "essa casa tem um clima bem tranquilo",
          "parece um bom lugar pra descansar...",
          "eu gosto desse tipo de silêncio aqui fora...",
          "essa casa combina com finais de tarde calmos",
          "será que alguém já mora aqui em pensamento? 🏡",
          "isso aqui parece um começo de história...",
          "um dia, a nossa casinha 🏡",
          "essa casinha parece esperar por alguém...",
          "é um lugar simples... mas especial"
        ][Math.floor(Math.random() * 12)]);
      }
      else if (tgt === ',') {
        spawn(fc, fr, 'spark'); sfxSparkle(); toast([
          "essas flores são bem bonitas 🌸",

      else { R(-3.2, -9 + lk * 0.4, 2.8, 6, o.bottom); R(0.4, -9 + rk * 0.4, 2.8, 6, o.bottom); R(-0.4, -9, 0.8, 6, botSh); }
      if (pose === 'cheer') { R(-5.2, -24, 1.8, 7, o.top); R(-5.4, -25.6, 1.9, 1.9, o.skin); R(3.4, -24, 1.8, 7, o.top); R(3.5, -25.6, 1.9, 1.9, o.skin); }
      else {
        const la = moving ? (ph > 0 ? 0.7 : -0.7) : 0, ra = -la;
        R(-5.4, -14 + la, 1.9, 5, o.top); R(-5.4, -9.4 + la, 1.9, 1.6, o.skin); R(3.5, -14 + ra, 1.9, 5, o.top); R(3.5, -9.4 + ra, 1.9, 1.6, o.skin);
      }
      R(-4, -15, 8, 7, o.top); R(-4, -10.2, 8, 1.1, topSh); R(-1.6, -15, 3.2, 1.1, shade(o.top, .06));
      R(-1.6, -16, 3.2, 1.4, o.skin);
      R(-4, -23.5, 8, 8, o.skin); R(-4, -16.2, 8, 0.9, skinSh);
      if (dir === 'up') {
        R(-4.2, -24.6, 8.4, 9, o.hair); R(-3.6, -16, 7.2, 9, o.hair);
        if (o.curly) {
          for (let k = -2; k <= 2; k++)Cc(k * 1.8, -24.4, 1.8, o.hair);
          for (let s = -1; s <= 1; s += 2) { Cc(s * 3.7, -21, 1.7, o.hair); Cc(s * 3.9, -18, 1.7, hairSh); Cc(s * 3.7, -14, 1.7, o.hair); Cc(s * 3.9, -10.5, 1.5, hairSh); Cc(s * 3.5, -7.5, 1.3, o.hair); } Cc(0, -8, 1.6, hairSh);
        }
      } else if (side) {
        if (o.curly) { for (let k = -2; k <= 1; k++)Cc(k * 1.7, -24, 1.6, o.hair); Cc(-3.7, -22, 1.6, o.hair); Cc(-3.6, -19.5, 1.4, o.hair); Cc(2.6, -22.5, 1.3, o.hair); }
        else { R(-4.4, -25, 8, 3.4, o.hair); R(-4.4, -23.5, 1.5, 6, o.hair); }
        if (o.accent) flower(Cc, -3.4, -23.4, o.accent);
        if (pose === 'kiss') { R(0.8, -19, 2, 0.7, '#3a2a2a'); R(1.6, -16.8, 1.7, 0.9, '#c84a64'); if (o.blush) R(2.3, -17.7, 1.5, 1.1, '#ffadbf'); }
        else {
          R(0.9, -19.4, 1.7, 2.1, '#fff'); R(1.6, -18.7, 1, 1.5, '#3a2a2a'); R(0.9, -20.4, 1.9, 0.7, hairSh);
          R(3.5, -18.4, 0.8, 1.2, skinSh); if (o.blush) R(2.4, -17.6, 1.4, 1.1, '#ffadbf'); R(2.3, -16.9, 1.5, 0.8, '#c84a64');
        }
      } else {
        if (o.curly) {
          for (let k = -2; k <= 2; k++)Cc(k * 1.7, -24.2, 1.7, o.hair); Cc(-3.9, -21.5, 1.6, o.hair); Cc(3.9, -21.5, 1.6, o.hair);
          Cc(-4, -19, 1.4, o.hair); Cc(4, -19, 1.4, o.hair); R(-3.7, -24, 2.4, 2, o.hair); R(1.3, -24, 2.4, 2, o.hair);
        }
        else { R(-4.5, -25, 9, 3.6, o.hair); R(-4.5, -23.5, 1.5, 7.2, o.hair); R(3, -23.5, 1.5, 7.2, o.hair); R(-3.6, -23.5, 7.2, 2.1, o.hair); }
        if (o.accent) flower(Cc, 3.4, -23.6, o.accent);
        if (pose === 'kiss') {
          R(-2.5, -19, 2, 0.7, '#3a2a2a'); R(0.8, -19, 2, 0.7, '#3a2a2a'); R(-1, -16.8, 2, 0.9, '#c84a64');
          if (o.blush) { R(-3.6, -17.9, 1.6, 1.1, '#ffadbf'); R(2, -17.9, 1.6, 1.1, '#ffadbf'); }
        }
        else {
          R(-2.5, -19.4, 1.7, 2.1, '#fff'); R(0.8, -19.4, 1.7, 2.1, '#fff'); R(-1.9, -18.7, 1.1, 1.5, '#3a2a2a'); R(0.8, -18.7, 1.1, 1.5, '#3a2a2a');
          R(-2.7, -20.4, 2, 0.7, hairSh); R(0.7, -20.4, 2, 0.7, hairSh);
          if (o.blush) { R(-3.5, -17.9, 1.6, 1.1, '#ffadbf'); R(1.9, -17.9, 1.6, 1.1, '#ffadbf'); } R(-1.1, -16.9, 2.2, 0.8, '#c84a64');
        }
      }
    }
    function flower(Cc, x, y, col) { Cc(x, y, 0.85, col); Cc(x - 0.9, y, 0.55, col); Cc(x + 0.9, y, 0.55, col); Cc(x, y - 0.9, 0.55, col); Cc(x, y + 0.9, 0.55, col); Cc(x, y, 0.45, '#ffe7a0'); }

    function drawWorld() {
      const mapW = COLS * TILE, mapH = ROWS * TILE;
      if (inEnding) { camX = cut.camX; camY = cut.camY; }
      else {
        camX = Math.max(0, Math.min(player.x * TILE - view.w / 2, mapW - view.w)); camY = Math.max(0, Math.min(player.y * TILE - view.h / 2, mapH - view.h));
        if (mapW < view.w) camX = (mapW - view.w) / 2; if (mapH < view.h) camY = (mapH - view.h) / 2;
      }
      ctx.fillStyle = '#2b5d34'; ctx.fillRect(0, 0, view.w, view.h);
      const c0 = Math.max(0, Math.floor(camX / TILE)), c1 = Math.min(COLS, Math.ceil((camX + view.w) / TILE));
      const r0 = Math.max(0, Math.floor(camY / TILE)), r1 = Math.min(ROWS, Math.ceil((camY + view.h) / TILE));
      for (let r = r0; r < r1; r++)for (let c = c0; c < c1; c++) { const ch = MAP[r][c], sx = c * TILE - camX, sy = r * TILE - camY; drawTile(c, r, (ch === 'H' || ch === 't') ? '.' : ch, sx, sy); }
      drawHouse(2 * TILE - camX, 1 * TILE - camY);
      const sprites = [];
      for (let r = 0; r < ROWS; r++)for (let c = 0; c < COLS; c++)if (MAP[r][c] === 't') sprites.push({ y: r + 0.9, type: 'tree', c, r });
      for (const h of HEARTS) if (!h.got) sprites.push({ y: h.r + 0.5, type: 'heart', h });
      sprites.push({ y: player.y, type: 'her' });
      if (inEnding && cut.phase !== 'sunset') sprites.push({ y: jardel.y, type: 'him' });
      sprites.sort((a, b) => a.y - b.y);
      for (const s of sprites) {
        if (s.type === 'tree') { let ox = 0; if (shakeTile && shakeTile.c === s.c && shakeTile.r === s.r) ox = Math.sin(timeS * 45) * shakeTile.t * TILE * 0.18; drawTree(s.c * TILE - camX + ox, s.r * TILE - camY); }
        else if (s.type === 'heart') {
          const hx = (s.h.c + 0.5) * TILE - camX, hyv = (s.h.r + 0.4) * TILE - camY, bobh = Math.sin(timeS * 3 + s.h.c) * TILE * 0.12;
          const isNear = (state === 'PLAY' && s.h === nearHeart);

            const gr = ctx.createRadialGradient(hx, hyv + bobh, 2, hx, hyv + bobh, TILE * 0.9);
            gr.addColorStop(0, 'rgba(255,180,200,.6)'); gr.addColorStop(1, 'rgba(255,180,200,0)');
            ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(hx, hyv + bobh, TILE * 0.9, 0, 7); ctx.fill();
            for (let k = 0; k < 6; k++) { const a = timeS * 3 + k * 1.047, rr = TILE * 0.6; ctx.fillStyle = '#fff2a0'; ctx.fillRect(hx + Math.cos(a) * rr - 2, hyv + bobh + Math.sin(a) * rr - 2, TILE * 0.07, TILE * 0.07); }
          }

          if (isNear) {
            ctx.fillStyle = 'rgba(255,246,230,.96)'; ctx.beginPath(); ctx.arc(hx, hyv - TILE * 0.9, TILE * 0.26, 0, 7); ctx.fill();
            ctx.fillStyle = '#c84a64'; ctx.textAlign = 'center'; ctx.font = '700 ' + Math.round(TILE * 0.34) + 'px Silkscreen, monospace'; ctx.fillText('A', hx, hyv - TILE * 0.78); ctx.textAlign = 'left';
          }
        }

        else drawPerson(jardel.x * TILE - camX, (jardel.y + 0.5) * TILE - camY, TILE / 24, JAR, jardel.dir, jardel.moving, timeS);

      // pickup heart rising

        const w = Math.min(view.w - 20, Math.max(120, toastMsg.length * 10 + 24));
        ctx.fillStyle = 'rgba(255,246,230,.96)'; roundRect(tx - w / 2, ty, w, 34, 10); ctx.fill();
        ctx.fillStyle = '#e7c9a0'; ctx.fillRect(tx - 4, ty + 33, 8, 6);
        ctx.fillStyle = '#5a4636'; ctx.textAlign = 'center'; ctx.font = '700 15px Nunito, sans-serif'; ctx.fillText(toastMsg, tx, ty + 22); ctx.textAlign = 'left';

    function roundRect(x, y, w, h, r) {
      ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
    }

    function cloud(x, y, s) {
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      [[0, 0, 1.4], [1.1, .2, 1], [-1.1, .2, 1], [.5, -.4, .9], [-.5, -.4, .9]].forEach(b => { ctx.beginPath(); ctx.ellipse(x + b[0] * s, y + b[1] * s, b[2] * s, b[2] * s * 0.7, 0, 0, 7); ctx.fill(); });
    }
    function bird(x, y, s) {
      ctx.strokeStyle = 'rgba(60,40,55,.7)'; ctx.lineWidth = Math.max(1.5, s * 0.16); const f = Math.sin(timeS * 6 + x * 0.05) * s * 0.5;
      ctx.beginPath(); ctx.moveTo(x - s, y + f); ctx.lineTo(x, y - f * 0.3); ctx.lineTo(x + s, y + f); ctx.stroke();
    }

    function drawSunset() {
      const hy = view.h * 0.54;
      let g = ctx.createLinearGradient(0, 0, 0, hy + view.h * 0.12);
      g.addColorStop(0, '#ffce8f'); g.addColorStop(0.45, '#ff9ea8'); g.addColorStop(1, '#c79ad6');

      // sun glow + disc

      ctx.fillStyle = '#fff0c2'; ctx.beginPath(); ctx.arc(cxs, cys, TILE * 1.25, 0, 7); ctx.fill();

      cloud(((timeS * 5 + view.w * 0.6) % (view.w + 260)) - 130, hy * 0.28, TILE * 0.4);
      cloud(((timeS * 9 + view.w * 0.3) % (view.w + 260)) - 130, hy * 0.62, TILE * 0.34);
      // birds
      bird(((timeS * 40) % (view.w + 120)) - 60, hy * 0.35, TILE * 0.28);
      bird(((timeS * 40 + 90) % (view.w + 120)) - 60, hy * 0.4, TILE * 0.22);
      bird(((timeS * 33 + view.w * 0.5) % (view.w + 120)) - 60, hy * 0.5, TILE * 0.25);
      // sea
      const seaB = hy + view.h * 0.12; g = ctx.createLinearGradient(0, hy, 0, seaB);
      g.addColorStop(0, '#ffb98a'); g.addColorStop(0.5, '#7fb6d8'); g.addColorStop(1, '#3f86b8');
      ctx.fillStyle = g; ctx.fillRect(0, hy, view.w, seaB - hy);
      // sun reflection
      ctx.fillStyle = 'rgba(255,240,190,.5)'; for (let yy = hy; yy < seaB; yy += 6) { const ww = TILE * 0.6 + Math.sin(timeS * 3 + yy) * TILE * 0.3; ctx.fillRect(cxs - ww / 2, yy, ww, 3); }
      // waves
      ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 2;
      for (let l = 0; l < 5; l++) {
        const yy = hy + 8 + l * ((seaB - hy - 8) / 5); ctx.beginPath();
        for (let x = 0; x <= view.w; x += 8) { const off = Math.sin((x * 0.04) + (timeS * 1.6) + l) * 3; if (x === 0) ctx.moveTo(x, yy + off); else ctx.lineTo(x, yy + off); } ctx.stroke();
      }
      // beach + grass
      ctx.fillStyle = '#e8d39a'; ctx.fillRect(0, seaB, view.w, TILE * 0.4);
      g = ctx.createLinearGradient(0, seaB, 0, view.h); g.addColorStop(0, '#86c763'); g.addColorStop(1, '#5fa450');
      ctx.fillStyle = g; ctx.fillRect(0, seaB + TILE * 0.4, view.w, view.h - seaB);
      // flowers on grass
      const gy = seaB + TILE * 0.7; for (let i = 0; i < 10; i++) {
        const fx = (i + 0.5) * view.w / 10 + Math.sin(timeS + i) * 3, fyy = gy + ((i * 53) % Math.max(20, view.h - gy - 20));
        const cc = ['#ff7aa2', '#ffd24d', '#ff9bd0', '#fff'][i % 4]; ctx.fillStyle = cc; ctx.fillRect(fx - 3, fyy - 3, 3, 3); ctx.fillRect(fx, fyy - 3, 3, 3); ctx.fillRect(fx - 3, fyy, 3, 3); ctx.fillRect(fx, fyy, 3, 3);
        ctx.fillStyle = '#ffe7a0'; ctx.fillRect(fx - 1, fyy - 1, 3, 3);
      }
      drawTree(view.w * 0.08, seaB + TILE * 0.2, 1.4); drawTree(view.w * 0.86, seaB, 1.6);
      // characters
      const baseY = view.h * 0.84, u = TILE / 22; let gap = 1.25, walk = false, pose = null;
      if (state === 'FINALE') {
        if (cut.phase === 'approach') { gap = 1.25 - (1.25 - 0.34) * Math.min(1, cut.t / 1.7); walk = true; }
        else if (['kiss', 'iris', 'heart', 'fim', 'credits'].includes(cut.phase)) { gap = 0.3; pose = 'kiss'; }
      }
      drawPerson(view.w / 2 - TILE * gap, baseY, u, XAY, 'right', walk, timeS, pose);
      drawPerson(view.w / 2 + TILE * gap, baseY, u, JAR, 'left', walk, timeS, pose);
      if (pose === 'kiss') {
        for (let i = 0; i < 5; i++) {
          const a = cut.t * 1.5 + i, ry = baseY - TILE * 2.4 - ((cut.t * 40 + i * 22) % (TILE * 3));
          drawHeartIcon(view.w / 2 + Math.sin(a) * TILE * 0.8, ry, TILE * 0.4, 0);
        }
      }
    }

    function stepConfetti(dt) { for (const p of confetti) { p.y += p.sp * dt; p.r += p.vr * dt; if (p.y > view.h + 20) { p.y = -20; p.x = Math.random() * view.w; } } }
    function drawConfetti() { for (const p of confetti) { ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r); drawHeartIcon(0, 0, p.s, 0); ctx.restore(); } }
    function irisCover(frac) {
      const rad = Math.max(0, Math.hypot(view.w, view.h) / 2 * frac); ctx.fillStyle = '#1a0f1a';
      ctx.beginPath(); ctx.rect(0, 0, view.w, view.h); ctx.arc(view.w / 2, view.h / 2, rad, 0, 7, true); ctx.fill('evenodd');
    }
    function drawFinaleOverlays(dt) {
      if (['celebrate', 'approach', 'kiss'].includes(cut.phase)) { stepConfetti(dt); drawConfetti(); }
      if (cut.phase === 'iris') irisCover(1 - Math.min(1, cut.t / 1.8));
      if (['heart', 'fim', 'credits'].includes(cut.phase)) { ctx.fillStyle = '#1a0f1a'; ctx.fillRect(0, 0, view.w, view.h); }
      if (cut.phase === 'heart') drawHeartIcon(view.w / 2, view.h / 2, TILE * 1.5 * (1 + Math.sin(cut.t * 4) * 0.08), 0);
      if (cut.phase === 'fim') { ctext('Fim', view.h / 2 - 6, TILE * 0.95, '#ffd2e0'); drawHeartIcon(view.w / 2, view.h / 2 + TILE * 1.1, TILE * 0.7, Math.sin(timeS * 3) * 4); }
      if (cut.phase === 'credits') {
        const top = view.h - cut.scroll; CREDITS.forEach((l, i) => {
          const ly = top + i * 42;
          if (ly > -40 && ly < view.h + 40) { if (l === '💛') drawHeartIcon(view.w / 2, ly - 8, TILE * 0.7, 0); else ctext(l, ly, i === 0 ? TILE * 0.7 : TILE * 0.42, i === 0 ? '#ffd2e0' : '#f0c8d4'); }
        });
        ctext('toque para acelerar', view.h - 24, TILE * 0.32, 'rgba(255,210,212,.6)');
      }
    }

    function loop(ts) {
      const dt = Math.min(0.05, (ts - last) / 1000) || 0; last = ts; timeS += dt;
      tickType(dt); updateToast(dt); updateParticles(dt); updateShake(dt);
      if (state === 'PLAY') update(dt);
      else if (state === 'PICKUP') { pickup.t += dt; if (pickup.t > 1.15) endPickup(); }
      else if (state === 'ENDING') updateCut(dt);
      else if (state === 'FINALE') updateFinale(dt);
      else if (state === 'GAMEOVER') updateGameOver(dt);
      if (state === 'START') { }
      else if (state === 'GAMEOVER') drawGameOver();
      else if (scene === 'sunset') drawSunset();
      else drawWorld();
      if (cut.fade > 0 && state !== 'GAMEOVER') { ctx.fillStyle = 'rgba(255,225,235,' + cut.fade + ')'; ctx.fillRect(0, 0, view.w, view.h); }
      if (state === 'FINALE') drawFinaleOverlays(dt);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
